openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: me
    description: Current user
  - name: plans
    description: Subscription plans
  - name: payments
    description: Payments
  - name: subscriptions
    description: Subscriptions
  - name: vpn-keys
    description: VPN keys
  - name: vpn-nodes
    description: VPN nodes
  - name: support
    description: Support tickets
  - name: admin
    description: Admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "200":
          description: Registered and signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Sign in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Sign out
      responses:
        "204":
          description: Signed out

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Start a password reset for the given email, if an account exists
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordInput"
      responses:
        "200":
          description: Reset started (response is intentionally generic to avoid leaking account existence)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForgotPasswordResult"

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Complete a password reset using a reset token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInput"
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetPasswordResult"

  /me:
    get:
      operationId: getMe
      tags: [me]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"
    patch:
      operationId: updateMe
      tags: [me]
      summary: Update the current user's display name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMeInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"

  /me/email:
    patch:
      operationId: changeMyEmail
      tags: [me]
      summary: Change the current user's login email (requires current password)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeEmailInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"
        "409":
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /me/password:
    patch:
      operationId: changeMyPassword
      tags: [me]
      summary: Change the current user's password (requires current password)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInput"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangePasswordResult"

  /plans:
    get:
      operationId: listPlans
      tags: [plans]
      summary: List subscription plans
      responses:
        "200":
          description: List of plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Plan"

  /payment-settings:
    get:
      operationId: getPaymentSettings
      tags: [payments]
      summary: Get payment instructions (SBP details)
      responses:
        "200":
          description: Payment settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentSettings"

  /vpn-nodes:
    get:
      operationId: listVpnNodes
      tags: [vpn-nodes]
      summary: List available VPN nodes/locations
      responses:
        "200":
          description: List of nodes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VpnNode"

  /subscriptions/me:
    get:
      operationId: listMySubscriptions
      tags: [subscriptions]
      summary: List current user's subscriptions
      responses:
        "200":
          description: List of subscriptions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subscription"

  /subscriptions:
    post:
      operationId: createSubscription
      tags: [subscriptions]
      summary: Start a subscription checkout (creates pending subscription + payment)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionInput"
      responses:
        "201":
          description: Created checkout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutResult"

  /payments/me:
    get:
      operationId: listMyPayments
      tags: [payments]
      summary: List current user's payments
      responses:
        "200":
          description: List of payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"

  /payments/{paymentId}/note:
    patch:
      operationId: updatePaymentNote
      tags: [payments]
      summary: Attach a transfer note/reference to a pending payment
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentNoteUpdate"
      responses:
        "200":
          description: Updated payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /payments/{paymentId}/screenshot:
    patch:
      operationId: updatePaymentScreenshot
      tags: [payments]
      summary: Attach a payment confirmation screenshot to a pending payment
      description: |
        The screenshot is stored directly in Postgres as base64 (this app
        runs as a single Docker container outside Replit, so no external
        object storage is used).
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentScreenshotUpdate"
      responses:
        "200":
          description: Updated payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /payments/{paymentId}/screenshot/image:
    get:
      operationId: getPaymentScreenshot
      tags: [payments]
      summary: Serve a payment's confirmation screenshot
      description: |
        Requires an authenticated session; a user may only view their own
        screenshot unless they are an admin.
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Image content streamed with correct Content-Type.
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: Screenshot not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /balance-transactions/me:
    get:
      operationId: listMyBalanceTransactions
      tags: [payments]
      summary: List current user's balance transaction history (top-ups, hourly debits, refunds)
      responses:
        "200":
          description: List of balance transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BalanceTransaction"

  /vpn-keys/me:
    get:
      operationId: listMyVpnKeys
      tags: [vpn-keys]
      summary: List current user's VPN keys
      responses:
        "200":
          description: List of VPN keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VpnKey"

  /vpn-keys:
    post:
      operationId: createVpnKey
      tags: [vpn-keys]
      summary: Issue a new VPN key on a node (requires an active subscription)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VpnKeyInput"
      responses:
        "201":
          description: Issued VPN key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VpnKey"

  /vpn-keys/{keyId}:
    delete:
      operationId: revokeVpnKey
      tags: [vpn-keys]
      summary: Revoke a VPN key
      parameters:
        - name: keyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Revoked

  /vpn-keys/subscription-url:
    get:
      operationId: getSubscriptionUrl
      tags: [vpn-keys]
      summary: >-
        Get the current user's stable subscription URL (a self-updating link
        that aggregates all of the user's active VPN keys — add it once in the
        client app instead of pasting individual vless links).
      responses:
        "200":
          description: Subscription URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionUrl"

  /balance-topup-order:
    post:
      operationId: createBalanceTopupOrder
      tags: [payments]
      summary: Start a balance top-up payment via SBP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BalanceTopupOrderBody"
      responses:
        "201":
          description: Created top-up order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BalanceTopupOrderResult"

  /balance-topup-order/{paymentId}:
    delete:
      operationId: deleteBalanceTopupOrder
      tags: [payments]
      summary: Cancel a pending balance top-up order
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelBalanceTopupOrderResult"

  /extra-slot-order:
    post:
      operationId: createExtraSlotOrder
      tags: [payments]
      summary: Start a checkout for an extra VPN device slot (requires an active subscription)
      responses:
        "201":
          description: Created checkout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtraSlotOrderResult"

  /extra-slot-order/{paymentId}:
    delete:
      operationId: deleteExtraSlotOrder
      tags: [payments]
      summary: Cancel a pending extra device slot order
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelExtraSlotOrderResult"

  /support-tickets:
    get:
      operationId: listMyTickets
      tags: [support]
      summary: List current user's support tickets
      responses:
        "200":
          description: List of tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupportTicket"
    post:
      operationId: createSupportTicket
      tags: [support]
      summary: Create a support ticket with an initial message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupportTicketCreateInput"
      responses:
        "201":
          description: Created ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportTicketBase"

  /support-tickets/{ticketId}:
    get:
      operationId: getTicket
      tags: [support]
      summary: Get a ticket with its messages
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ticket with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportTicketDetail"

  /support-tickets/{ticketId}/messages:
    post:
      operationId: addTicketMessage
      tags: [support]
      summary: Add a message to a ticket
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupportMessageInput"
      responses:
        "201":
          description: Added message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportMessage"

  /admin/dashboard/summary:
    get:
      operationId: getAdminDashboardSummary
      tags: [admin]
      summary: Admin dashboard summary metrics
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /admin/plans:
    post:
      operationId: createPlan
      tags: [admin]
      summary: Create a plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlanInput"
      responses:
        "201":
          description: Created plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plan"

  /admin/plans/{planId}:
    patch:
      operationId: updatePlan
      tags: [admin]
      summary: Update a plan
      parameters:
        - name: planId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlanUpdate"
      responses:
        "200":
          description: Updated plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plan"
    delete:
      operationId: deletePlan
      tags: [admin]
      summary: Delete a plan
      parameters:
        - name: planId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/payment-settings:
    patch:
      operationId: updatePaymentSettings
      tags: [admin]
      summary: Update SBP payment instructions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentSettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentSettings"

  /admin/payments:
    get:
      operationId: listAdminPayments
      tags: [admin]
      summary: List payments (optionally filtered by status)
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaymentStatus"
      responses:
        "200":
          description: List of payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminPayment"

  /admin/payments/{paymentId}/confirm:
    post:
      operationId: confirmPayment
      tags: [admin]
      summary: Confirm a payment and activate the subscription
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Confirmed payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /admin/payments/{paymentId}/reject:
    post:
      operationId: rejectPayment
      tags: [admin]
      summary: Reject a payment
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentReject"
      responses:
        "200":
          description: Rejected payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /admin/vpn-nodes:
    post:
      operationId: createVpnNode
      tags: [admin]
      summary: Register a VPN node
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VpnNodeInput"
      responses:
        "201":
          description: Created node
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VpnNode"

  /admin/vpn-nodes/{nodeId}:
    patch:
      operationId: updateVpnNode
      tags: [admin]
      summary: Update a VPN node
      parameters:
        - name: nodeId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VpnNodeUpdate"
      responses:
        "200":
          description: Updated node
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VpnNode"
    delete:
      operationId: deleteVpnNode
      tags: [admin]
      summary: Delete a VPN node
      parameters:
        - name: nodeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      summary: List all users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"

  /admin/vpn-keys:
    get:
      operationId: listAdminVpnKeys
      tags: [admin]
      summary: List all VPN keys, with per-key traffic counters
      responses:
        "200":
          description: List of VPN keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VpnKey"

  /admin/vpn-keys/{keyId}:
    delete:
      operationId: revokeAdminVpnKey
      tags: [admin]
      summary: Revoke a VPN key
      parameters:
        - name: keyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Revoked

  /admin/users/{userId}/password-reset:
    post:
      operationId: adminResetUserPassword
      tags: [admin]
      summary: Generate a one-time password reset link for a user (admin-assisted reset, no email sending configured)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reset link generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPasswordResetResult"

  /admin/users/{userId}:
    patch:
      operationId: updateUserProfile
      tags: [admin]
      summary: Edit a user's name and/or email
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUserProfileUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
    delete:
      operationId: deleteUser
      tags: [admin]
      summary: Permanently delete a user and all of their data (keys, subscriptions, payments, tickets)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/users/{userId}/role:
    patch:
      operationId: updateUserRole
      tags: [admin]
      summary: Update a user's role
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRoleUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"

  /admin/users/{userId}/subscription:
    patch:
      operationId: updateUserSubscription
      tags: [admin]
      summary: Manually assign/change a user's plan and (re)activate or extend their subscription
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminSubscriptionUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"

  /admin/users/{userId}/extra-slots:
    patch:
      operationId: updateUserExtraSlots
      tags: [admin]
      summary: Set a user's extra device slot count
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceSlotsUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"

  /admin/support-tickets:
    get:
      operationId: listAdminTickets
      tags: [admin]
      summary: List all support tickets (optionally filtered by status)
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/TicketStatusFilter"
      responses:
        "200":
          description: List of tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupportTicket"

  /admin/support-tickets/{ticketId}:
    get:
      operationId: getAdminTicket
      tags: [admin]
      summary: Get a ticket with its messages
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ticket with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportTicketDetail"

  /admin/support-tickets/{ticketId}/messages:
    post:
      operationId: adminAddTicketMessage
      tags: [admin]
      summary: Reply to a ticket as an admin
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupportMessageInput"
      responses:
        "201":
          description: Added message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportMessage"

  /admin/support-tickets/{ticketId}/status:
    patch:
      operationId: updateTicketStatus
      tags: [admin]
      summary: Update a ticket's status
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketStatusUpdate"
      responses:
        "200":
          description: Updated ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportTicketBase"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    UserRole:
      type: string
      enum: [user, admin]

    RegisterInput:
      type: object
      required: [email, password, ref]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8, maxLength: 200 }
        name: { type: string }
        # Invite-only signup: must match an existing user's referralCode.
        # There is no bootstrap exception — the seeded admin account already
        # has one, so it's the root of every invite chain.
        ref: { type: string, minLength: 1 }

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 1, maxLength: 200 }

    ForgotPasswordInput:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }

    ForgotPasswordResult:
      type: object
      required: [message]
      properties:
        message: { type: string }

    ResetPasswordInput:
      type: object
      required: [token, password]
      properties:
        token: { type: string, minLength: 1 }
        password: { type: string, minLength: 8, maxLength: 200 }

    ResetPasswordResult:
      type: object
      required: [message]
      properties:
        message: { type: string }

    UpdateMeInput:
      type: object
      properties:
        name: { type: ["string", "null"] }

    ChangeEmailInput:
      type: object
      required: [newEmail, currentPassword]
      properties:
        newEmail: { type: string, format: email }
        currentPassword: { type: string, minLength: 1, maxLength: 200 }

    ChangePasswordInput:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword: { type: string, minLength: 1, maxLength: 200 }
        newPassword: { type: string, minLength: 8, maxLength: 200 }

    ChangePasswordResult:
      type: object
      required: [message]
      properties:
        message: { type: string }

    Me:
      type: object
      required:
        [
          id,
          email,
          role,
          hasActiveSubscription,
          deviceSlots,
          activeKeyCount,
          balanceKopecks,
          referralCode,
          referralCommissionPercent,
          referralEarningsKopecks,
          referredUserCount,
          referralLinkHost,
        ]
      properties:
        id: { type: integer }
        email: { type: string }
        name: { type: ["string", "null"] }
        role:
          $ref: "#/components/schemas/UserRole"
        hasActiveSubscription: { type: boolean }
        currentPlanName: { type: ["string", "null"] }
        subscriptionEndsAt: { type: ["string", "null"], format: date-time }
        currentPlanBillingType:
          oneOf:
            - $ref: "#/components/schemas/PlanBillingType"
            - type: "null"
        hourlyRateKopecks: { type: ["integer", "null"] }
        lastBilledAt: { type: ["string", "null"], format: date-time }
        deviceSlots: { type: integer }
        activeKeyCount: { type: integer }
        balanceKopecks: { type: integer }
        # Traffic cap for the current plan's period, in gigabytes. Null when
        # there is no active subscription or the plan has no cap.
        trafficLimitGb: { type: ["integer", "null"] }
        # Sum of periodUpBytes + periodDownBytes across all of the user's
        # non-revoked VPN keys, for showing usage vs trafficLimitGb.
        periodUsageBytes: { type: integer }
        # Personal invite code, shown as a shareable link in the profile.
        referralCode: { type: string }
        # % of a referral's confirmed subscription payment credited to this
        # user's wallet — pulled live from payment_settings, so it reflects
        # the current admin-configured rate, not a snapshot.
        referralCommissionPercent: { type: integer }
        # Sum of all "referral" balance_transactions ever credited to this
        # user (kopecks). Lifetime total, not tied to a billing period.
        referralEarningsKopecks: { type: integer }
        # Number of accounts registered using this user's referral code.
        referredUserCount: { type: integer }
        # Host to build the shareable referral link against: the
        # admin-configured primary public domain if it's currently healthy,
        # otherwise the request's own (technical) host as a safety-net
        # fallback. Frontend must use this instead of window.location.origin.
        referralLinkHost: { type: string }

    PlanBillingType:
      type: string
      enum: [monthly, hourly]

    Plan:
      type: object
      required: [id, name, priceRub, durationDays, devicesIncluded, trafficLimitGb, billingType, hourlyRateKopecks, isActive]
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: ["string", "null"] }
        priceRub: { type: integer }
        durationDays: { type: integer }
        devicesIncluded: { type: integer }
        # Traffic cap per subscription period, in gigabytes. Null = unlimited.
        trafficLimitGb: { type: ["integer", "null"] }
        billingType:
          $ref: "#/components/schemas/PlanBillingType"
        # Per-hour rate in kopecks, billed automatically in 5-minute
        # increments while the user's VPN client is actually sending
        # traffic. Null for monthly plans.
        hourlyRateKopecks: { type: ["integer", "null"] }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }

    PlanInput:
      type: object
      required: [name, priceRub, durationDays]
      properties:
        name: { type: string, minLength: 1 }
        description: { type: string }
        priceRub: { type: integer, minimum: 0 }
        # 0 is valid for hourly plans, which don't use a fixed duration
        # (billed continuously from balance instead — see hourlyBilling.ts).
        durationDays: { type: integer, minimum: 0 }
        devicesIncluded: { type: integer, minimum: 1 }
        trafficLimitGb: { type: ["integer", "null"], minimum: 1 }
        billingType:
          $ref: "#/components/schemas/PlanBillingType"
        hourlyRateKopecks: { type: ["integer", "null"], minimum: 1 }
        isActive: { type: boolean }

    PlanUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        description: { type: string }
        priceRub: { type: integer, minimum: 0 }
        durationDays: { type: integer, minimum: 0 }
        devicesIncluded: { type: integer, minimum: 1 }
        trafficLimitGb: { type: ["integer", "null"], minimum: 1 }
        billingType:
          $ref: "#/components/schemas/PlanBillingType"
        hourlyRateKopecks: { type: ["integer", "null"], minimum: 1 }
        isActive: { type: boolean }

    PaymentSettings:
      type: object
      required: [sbpPhone, sbpBank, sbpRecipientName, extraDeviceSlotPriceRub, allowFreeExtraDeviceSlot, trialEnabled, trialDays]
      properties:
        sbpPhone: { type: string }
        sbpBank: { type: string }
        sbpRecipientName: { type: string }
        instructions: { type: ["string", "null"] }
        yookassaEnabled: { type: boolean }
        extraDeviceSlotPriceRub: { type: integer }
        allowFreeExtraDeviceSlot: { type: boolean }
        trialEnabled: { type: boolean }
        trialDays: { type: integer }
        # Minimum wallet balance (in rubles) a user must top up before an
        # hourly plan can be activated. 0 = no minimum required.
        minHourlyTopupRub: { type: integer }
        # Public-facing domain embedded in subscription/vless links when it's
        # healthy (e.g. "vpnexus.pro"). Admin-editable so it can be swapped
        # instantly (without a redeploy) if the domain is ever blocked.
        # Empty string means "use the built-in default".
        primaryDomain: { type: string }
        # % of a referred user's confirmed subscription payment credited to
        # the referrer's wallet balance. 0 disables referral payouts.
        referralCommissionPercent: { type: integer }

    PaymentSettingsUpdate:
      type: object
      properties:
        sbpPhone: { type: string }
        sbpBank: { type: string }
        sbpRecipientName: { type: string }
        instructions: { type: string }
        yookassaEnabled: { type: boolean }
        extraDeviceSlotPriceRub: { type: integer, minimum: 0 }
        allowFreeExtraDeviceSlot: { type: boolean }
        trialEnabled: { type: boolean }
        trialDays: { type: integer, minimum: 1, maximum: 365 }
        minHourlyTopupRub: { type: integer, minimum: 0 }
        primaryDomain: { type: string }
        referralCommissionPercent: { type: integer, minimum: 0, maximum: 100 }

    SubscriptionStatus:
      type: string
      enum: [pending_payment, active, expired, cancelled, rejected]

    Subscription:
      type: object
      required: [id, planId, plan, status, createdAt]
      properties:
        id: { type: integer }
        planId: { type: integer }
        plan:
          $ref: "#/components/schemas/Plan"
        status:
          $ref: "#/components/schemas/SubscriptionStatus"
        startsAt: { type: ["string", "null"], format: date-time }
        endsAt: { type: ["string", "null"], format: date-time }
        # Hourly plans only: how far usage has already been charged. Null
        # means no usage has been billed yet (device hasn't connected).
        lastBilledAt: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }

    SubscriptionInput:
      type: object
      required: [planId]
      properties:
        planId: { type: integer }
        provider:
          $ref: "#/components/schemas/PaymentProvider"

    PaymentProvider:
      type: string
      enum: [manual_sbp, yookassa]

    PaymentStatus:
      type: string
      enum: [pending, confirmed, rejected]

    PaymentType:
      type: string
      enum: [subscription, extra_device_slot, balance_topup]

    Payment:
      type: object
      required: [id, subscriptionId, type, provider, amountRub, status, reference, createdAt]
      properties:
        id: { type: integer }
        subscriptionId: { type: ["integer", "null"] }
        type:
          $ref: "#/components/schemas/PaymentType"
        provider:
          $ref: "#/components/schemas/PaymentProvider"
        amountRub: { type: integer }
        status:
          $ref: "#/components/schemas/PaymentStatus"
        reference: { type: string }
        userNote: { type: ["string", "null"] }
        # Whether the user has attached a payment confirmation screenshot.
        # The image itself is fetched separately via GET .../screenshot/image.
        hasScreenshot: { type: boolean }
        rejectionReason: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        confirmedAt: { type: ["string", "null"], format: date-time }

    AdminPayment:
      type: object
      required:
        [id, subscriptionId, userId, userEmail, planName, type, provider, amountRub, status, reference, createdAt]
      properties:
        id: { type: integer }
        subscriptionId: { type: ["integer", "null"] }
        userId: { type: integer }
        userEmail: { type: string }
        planName: { type: ["string", "null"] }
        type:
          $ref: "#/components/schemas/PaymentType"
        provider:
          $ref: "#/components/schemas/PaymentProvider"
        amountRub: { type: integer }
        status:
          $ref: "#/components/schemas/PaymentStatus"
        reference: { type: string }
        userNote: { type: ["string", "null"] }
        hasScreenshot: { type: boolean }
        rejectionReason: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        confirmedAt: { type: ["string", "null"], format: date-time }

    PaymentNoteUpdate:
      type: object
      required: [userNote]
      properties:
        userNote: { type: string, minLength: 1 }

    PaymentScreenshotUpdate:
      type: object
      required: [data, mimeType]
      properties:
        data:
          type: string
          minLength: 1
          description: "Base64-encoded image bytes (no data: URL prefix)."
        mimeType:
          type: string
          minLength: 1
          description: MIME type of the image (e.g. `image/jpeg`).

    PaymentReject:
      type: object
      properties:
        reason: { type: string }

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    CheckoutResult:
      type: object
      required: [subscription, payment]
      properties:
        subscription:
          $ref: "#/components/schemas/Subscription"
        # Null when activating an hourly plan: those are paid from the
        # user's balance as usage accrues, so there's no upfront payment
        # record to confirm.
        payment:
          oneOf:
            - $ref: "#/components/schemas/Payment"
            - type: "null"

    VpnNode:
      type: object
      required: [id, name, region, sni, isActive]
      properties:
        id: { type: integer }
        name: { type: string }
        region: { type: string }
        host: { type: ["string", "null"] }
        port: { type: integer }
        sni: { type: string }
        isActive: { type: boolean }
        maxUsers: { type: ["integer", "null"] }
        activeUserCount: { type: integer }
        createdAt: { type: string, format: date-time }

    VpnNodeInput:
      type: object
      required: [name, region, sni]
      properties:
        name: { type: string, minLength: 1 }
        region: { type: string, minLength: 1 }
        host: { type: string }
        port: { type: integer }
        panelUrl: { type: string }
        panelLogin: { type: string }
        panelPassword: { type: string }
        publicKey: { type: string }
        shortId: { type: string }
        sni: { type: string, minLength: 1 }
        isActive: { type: boolean }
        maxUsers: { type: ["integer", "null"], minimum: 1 }

    VpnNodeUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        region: { type: string, minLength: 1 }
        host: { type: string }
        port: { type: integer }
        panelUrl: { type: string }
        panelLogin: { type: string }
        panelPassword: { type: string }
        publicKey: { type: string }
        shortId: { type: string }
        sni: { type: string, minLength: 1 }
        isActive: { type: boolean }
        maxUsers: { type: ["integer", "null"], minimum: 1 }

    VpnKey:
      type: object
      required:
        [
          id,
          nodeId,
          nodeName,
          label,
          vlessLink,
          deepLink,
          createdAt,
          trafficUpBytes,
          trafficDownBytes,
          periodUpBytes,
          periodDownBytes,
          periodStartedAt,
          userId,
        ]
      properties:
        id: { type: integer }
        nodeId: { type: integer }
        nodeName: { type: string }
        label: { type: string }
        description: { type: ["string", "null"] }
        vlessLink: { type: string }
        deepLink: { type: string }
        createdAt: { type: string, format: date-time }
        revokedAt: { type: ["string", "null"], format: date-time }
        userId: { type: integer }
        userEmail: { type: string }
        # Lifetime traffic counters, in bytes, accumulated from Xray's Stats
        # API by the background polling job (stay 0 if Xray isn't running
        # locally, e.g. in Replit dev).
        trafficUpBytes: { type: integer }
        trafficDownBytes: { type: integer }
        # Traffic since periodStartedAt (reset to 0 on subscription renewal).
        periodUpBytes: { type: integer }
        periodDownBytes: { type: integer }
        periodStartedAt: { type: string, format: date-time }
        # Timestamp of the last observed traffic on this key (from the
        # background Xray stats poller). Null if never seen any traffic.
        lastTrafficAt: { type: ["string", "null"], format: date-time }

    VpnKeyInput:
      type: object
      properties:
        nodeId: { type: integer }
        label: { type: string }
        description: { type: string }

    SubscriptionUrl:
      type: object
      required: [url]
      properties:
        url: { type: string }

    BalanceTransactionType:
      type: string
      enum: [topup, debit, refund]

    BalanceTransaction:
      type: object
      required: [id, amountKopecks, type, createdAt]
      properties:
        id: { type: integer }
        amountKopecks: { type: integer }
        type:
          $ref: "#/components/schemas/BalanceTransactionType"
        description: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }

    AdminUser:
      type: object
      required:
        [
          id,
          email,
          role,
          createdAt,
          extraDeviceSlots,
          trafficUpBytes,
          trafficDownBytes,
          periodUpBytes,
          periodDownBytes,
          periodStartedAt,
          trafficLimitGb,
          trafficLimitExceeded,
          isOnline,
          balanceKopecks,
          referralCode,
          referredUserCount,
        ]
      properties:
        id: { type: integer }
        email: { type: string }
        name: { type: ["string", "null"] }
        balanceKopecks: { type: integer }
        referralCode: { type: string }
        # Who referred this user in, if anyone (null for the root admin).
        referredByEmail: { type: ["string", "null"] }
        # Number of accounts registered using this user's own referral code.
        referredUserCount: { type: integer }
        role:
          $ref: "#/components/schemas/UserRole"
        createdAt: { type: string, format: date-time }
        # Last authenticated request (throttled to ~1/min server-side).
        lastActiveAt: { type: ["string", "null"], format: date-time }
        # true if lastActiveAt is within the last 5 minutes.
        isOnline: { type: boolean }
        activeSubscriptions: { type: integer }
        # extraDeviceSlots is sourced from the user's currently ACTIVE
        # subscription row (0 if none) — slots do not carry over across
        # renewal/switch. activeSubscriptionId is what the admin extra-slots
        # PATCH targets; null means there is nothing to grant slots against.
        extraDeviceSlots: { type: integer }
        activeSubscriptionId: { type: ["integer", "null"] }
        # Aggregated across all of this user's own VPN keys.
        trafficUpBytes: { type: integer }
        trafficDownBytes: { type: integer }
        periodUpBytes: { type: integer }
        periodDownBytes: { type: integer }
        # Start of the current billing window (reset when subscription renews).
        periodStartedAt: { type: ["string", "null"], format: date-time }
        # From the user's currently active plan, if any; null = no active
        # subscription or an unlimited plan.
        trafficLimitGb: { type: ["integer", "null"] }
        trafficLimitExceeded: { type: boolean }
        # The user's genuinely active plan right now (status=active, not
        # expired). Use this for any "what plan is this user on" display —
        # e.g. the traffic summary line — since it can never show a
        # cancelled/pending/rejected request as if it were in effect.
        activePlanName: { type: ["string", "null"] }
        # Current (most recently started) subscription, regardless of status,
        # so the admin panel can show what a user has even if it's expired,
        # cancelled, or awaiting payment. Null fields = no subscription at all.
        # This intentionally can differ from activePlanName (e.g. a cancelled
        # downgrade request shows up here with status "cancelled" while
        # activePlanName still reflects the real, unaffected active plan).
        planId: { type: ["integer", "null"] }
        planName: { type: ["string", "null"] }
        subscriptionStatus:
          oneOf:
            - $ref: "#/components/schemas/SubscriptionStatus"
            - type: "null"
        subscriptionEndsAt: { type: ["string", "null"], format: date-time }

    AdminUserProfileUpdate:
      type: object
      properties:
        name: { type: ["string", "null"] }
        email: { type: string, format: email }

    AdminSubscriptionUpdate:
      type: object
      required: [planId]
      properties:
        planId: { type: integer }
        # Overrides the plan's own durationDays for this activation, so an
        # admin can grant e.g. a custom 7-day trial extension on top of a
        # monthly plan. Defaults to the plan's durationDays when omitted.
        durationDays: { type: integer, minimum: 1 }

    AdminPasswordResetResult:
      type: object
      required: [resetUrl]
      properties:
        resetUrl: { type: string }

    UserRoleUpdate:
      type: object
      required: [role]
      properties:
        role:
          $ref: "#/components/schemas/UserRole"

    DashboardSummary:
      type: object
      required: [totalUsers, activeSubscriptions, pendingPayments, monthlyRevenueRub, last30DaysRevenueRub, totalVpnKeys, openTickets, activeNow, newUsersLast7Days, newUsersLast30Days, planDistribution, revenueByDay]
      properties:
        totalUsers: { type: integer }
        activeSubscriptions: { type: integer }
        pendingPayments: { type: integer }
        monthlyRevenueRub: { type: integer }
        last30DaysRevenueRub: { type: integer }
        totalVpnKeys: { type: integer }
        openTickets: { type: integer }
        # Users with lastActiveAt within the last 5 minutes.
        activeNow: { type: integer }
        newUsersLast7Days: { type: integer }
        newUsersLast30Days: { type: integer }
        # Count of currently-active subscriptions grouped by plan name.
        planDistribution:
          type: array
          items:
            $ref: "#/components/schemas/PlanDistributionEntry"
        # Confirmed revenue (rubles) per calendar day, oldest first, for the
        # last 14 days (days with no confirmed payments still appear, with 0).
        revenueByDay:
          type: array
          items:
            $ref: "#/components/schemas/RevenueByDayEntry"

    PlanDistributionEntry:
      type: object
      required: [planName, count]
      properties:
        planName: { type: string }
        count: { type: integer }

    RevenueByDayEntry:
      type: object
      required: [date, amountRub]
      properties:
        date: { type: string, format: date }
        amountRub: { type: integer }

    BalanceTopupOrderBody:
      type: object
      required: [amountRub]
      properties:
        amountRub: { type: integer, minimum: 1 }

    BalanceTopupOrderResult:
      type: object
      required: [paymentId, amountRub]
      properties:
        paymentId: { type: integer }
        amountRub: { type: integer }

    CancelBalanceTopupOrderResult:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }

    ExtraSlotOrderResult:
      type: object
      required: [amountRub, freeGranted]
      properties:
        paymentId: { type: integer }
        amountRub: { type: integer }
        # true when the slot was granted immediately (admin enabled the free
        # override at price 0) — no checkout/payment flow follows.
        freeGranted: { type: boolean }

    CancelExtraSlotOrderResult:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }

    DeviceSlotsUpdate:
      type: object
      required: [extraDeviceSlots]
      properties:
        extraDeviceSlots: { type: integer, minimum: 0 }

    TicketStatus:
      type: string
      enum: [open, answered, closed]

    SupportTicketBase:
      type: object
      required: [id, userId, subject, status, createdAt, updatedAt]
      properties:
        id: { type: integer }
        userId: { type: integer }
        subject: { type: string }
        status:
          $ref: "#/components/schemas/TicketStatus"
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    SupportTicket:
      type: object
      required: [id, userId, subject, status, createdAt, updatedAt, userEmail, messageCount]
      properties:
        id: { type: integer }
        userId: { type: integer }
        subject: { type: string }
        status:
          $ref: "#/components/schemas/TicketStatus"
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        userEmail: { type: string }
        messageCount: { type: integer }

    SupportMessage:
      type: object
      required: [id, ticketId, authorId, body, createdAt, authorEmail, isAdmin]
      properties:
        id: { type: integer }
        ticketId: { type: integer }
        authorId: { type: integer }
        body: { type: string }
        createdAt: { type: string, format: date-time }
        authorEmail: { type: string }
        isAdmin: { type: boolean }

    SupportTicketCreateInput:
      type: object
      required: [subject, body]
      properties:
        subject: { type: string, minLength: 1, maxLength: 200 }
        body: { type: string, minLength: 1, maxLength: 4000 }

    SupportTicketDetail:
      type: object
      required: [id, userId, subject, status, createdAt, updatedAt, userEmail, messageCount, messages]
      properties:
        id: { type: integer }
        userId: { type: integer }
        subject: { type: string }
        status:
          $ref: "#/components/schemas/TicketStatus"
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        userEmail: { type: string }
        messageCount: { type: integer }
        messages:
          type: array
          items:
            $ref: "#/components/schemas/SupportMessage"

    SupportMessageInput:
      type: object
      required: [body]
      properties:
        body: { type: string, minLength: 1, maxLength: 4000 }

    TicketStatusFilter:
      $ref: "#/components/schemas/TicketStatus"

    TicketStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          $ref: "#/components/schemas/TicketStatus"
