openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: me
    description: Current user
  - name: plans
    description: Subscription plans
  - name: payments
    description: Payments
  - name: subscriptions
    description: Subscriptions
  - name: vpn-keys
    description: VPN keys
  - name: vpn-nodes
    description: VPN nodes
  - name: support
    description: Support tickets
  - name: admin
    description: Admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "200":
          description: Registered and signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Sign in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Sign out
      responses:
        "204":
          description: Signed out

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Start a password reset for the given email, if an account exists
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordInput"
      responses:
        "200":
          description: Reset started (response is intentionally generic to avoid leaking account existence)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForgotPasswordResult"

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Complete a password reset using a reset token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInput"
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetPasswordResult"

  /me:
    get:
      operationId: getMe
      tags: [me]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"

  /plans:
    get:
      operationId: listPlans
      tags: [plans]
      summary: List subscription plans
      responses:
        "200":
          description: List of plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Plan"

  /payment-settings:
    get:
      operationId: getPaymentSettings
      tags: [payments]
      summary: Get payment instructions (SBP details)
      responses:
        "200":
          description: Payment settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentSettings"

  /vpn-nodes:
    get:
      operationId: listVpnNodes
      tags: [vpn-nodes]
      summary: List available VPN nodes/locations
      responses:
        "200":
          description: List of nodes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VpnNode"

  /subscriptions/me:
    get:
      operationId: listMySubscriptions
      tags: [subscriptions]
      summary: List current user's subscriptions
      responses:
        "200":
          description: List of subscriptions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subscription"

  /subscriptions:
    post:
      operationId: createSubscription
      tags: [subscriptions]
      summary: Start a subscription checkout (creates pending subscription + payment)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionInput"
      responses:
        "201":
          description: Created checkout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutResult"

  /payments/me:
    get:
      operationId: listMyPayments
      tags: [payments]
      summary: List current user's payments
      responses:
        "200":
          description: List of payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"

  /payments/{paymentId}/note:
    patch:
      operationId: updatePaymentNote
      tags: [payments]
      summary: Attach a transfer note/reference to a pending payment
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentNoteUpdate"
      responses:
        "200":
          description: Updated payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /vpn-keys/me:
    get:
      operationId: listMyVpnKeys
      tags: [vpn-keys]
      summary: List current user's VPN keys
      responses:
        "200":
          description: List of VPN keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VpnKey"

  /vpn-keys:
    post:
      operationId: createVpnKey
      tags: [vpn-keys]
      summary: Issue a new VPN key on a node (requires an active subscription)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VpnKeyInput"
      responses:
        "201":
          description: Issued VPN key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VpnKey"

  /vpn-keys/{keyId}:
    delete:
      operationId: revokeVpnKey
      tags: [vpn-keys]
      summary: Revoke a VPN key
      parameters:
        - name: keyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Revoked

  /vpn-keys/subscription-url:
    get:
      operationId: getSubscriptionUrl
      tags: [vpn-keys]
      summary: >-
        Get the current user's stable subscription URL (a self-updating link
        that aggregates all of the user's active VPN keys — add it once in the
        client app instead of pasting individual vless links).
      responses:
        "200":
          description: Subscription URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionUrl"

  /admin/dashboard/summary:
    get:
      operationId: getAdminDashboardSummary
      tags: [admin]
      summary: Admin dashboard summary metrics
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /admin/plans:
    post:
      operationId: createPlan
      tags: [admin]
      summary: Create a plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlanInput"
      responses:
        "201":
          description: Created plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plan"

  /admin/plans/{planId}:
    patch:
      operationId: updatePlan
      tags: [admin]
      summary: Update a plan
      parameters:
        - name: planId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlanUpdate"
      responses:
        "200":
          description: Updated plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plan"
    delete:
      operationId: deletePlan
      tags: [admin]
      summary: Delete a plan
      parameters:
        - name: planId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/payment-settings:
    patch:
      operationId: updatePaymentSettings
      tags: [admin]
      summary: Update SBP payment instructions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentSettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentSettings"

  /admin/payments:
    get:
      operationId: listAdminPayments
      tags: [admin]
      summary: List payments (optionally filtered by status)
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaymentStatus"
      responses:
        "200":
          description: List of payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminPayment"

  /admin/payments/{paymentId}/confirm:
    post:
      operationId: confirmPayment
      tags: [admin]
      summary: Confirm a payment and activate the subscription
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Confirmed payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /admin/payments/{paymentId}/reject:
    post:
      operationId: rejectPayment
      tags: [admin]
      summary: Reject a payment
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentReject"
      responses:
        "200":
          description: Rejected payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /admin/vpn-nodes:
    post:
      operationId: createVpnNode
      tags: [admin]
      summary: Register a VPN node
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VpnNodeInput"
      responses:
        "201":
          description: Created node
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VpnNode"

  /admin/vpn-nodes/{nodeId}:
    patch:
      operationId: updateVpnNode
      tags: [admin]
      summary: Update a VPN node
      parameters:
        - name: nodeId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VpnNodeUpdate"
      responses:
        "200":
          description: Updated node
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VpnNode"
    delete:
      operationId: deleteVpnNode
      tags: [admin]
      summary: Delete a VPN node
      parameters:
        - name: nodeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      summary: List all users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"

  /admin/users/{userId}/password-reset:
    post:
      operationId: adminResetUserPassword
      tags: [admin]
      summary: Generate a one-time password reset link for a user (admin-assisted reset, no email sending configured)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reset link generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPasswordResetResult"

  /extra-slot-order:
    post:
      operationId: createExtraSlotOrder
      tags: [payments]
      summary: Start a payment to purchase one extra device slot (requires an active subscription)
      responses:
        "201":
          description: Created pending payment for the extra slot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateExtraSlotOrderResult"

  /extra-slot-order/{paymentId}:
    delete:
      operationId: deleteExtraSlotOrder
      tags: [payments]
      summary: Cancel a pending extra device slot payment
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"

  /support-tickets:
    get:
      operationId: listMyTickets
      tags: [support]
      summary: List current user's support tickets
      responses:
        "200":
          description: List of tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupportTicket"
    post:
      operationId: createSupportTicket
      tags: [support]
      summary: Create a support ticket with an initial message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupportTicketInput"
      responses:
        "201":
          description: Created ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportTicketRow"

  /support-tickets/{ticketId}:
    get:
      operationId: getTicket
      tags: [support]
      summary: Get a ticket with its messages
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ticket with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportTicketDetail"

  /support-tickets/{ticketId}/messages:
    post:
      operationId: addTicketMessage
      tags: [support]
      summary: Add a message to one of the current user's tickets
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketMessageInput"
      responses:
        "201":
          description: Created message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportMessage"

  /admin/support-tickets:
    get:
      operationId: listAdminTickets
      tags: [admin]
      summary: List all support tickets (optionally filtered by status)
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/TicketStatus"
      responses:
        "200":
          description: List of tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupportTicket"

  /admin/support-tickets/{ticketId}:
    get:
      operationId: getAdminTicket
      tags: [admin]
      summary: Get a ticket with its messages (admin)
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ticket with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportTicketDetail"

  /admin/support-tickets/{ticketId}/messages:
    post:
      operationId: adminAddTicketMessage
      tags: [admin]
      summary: Reply to a support ticket as an admin
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketMessageInput"
      responses:
        "201":
          description: Created message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportMessage"

  /admin/support-tickets/{ticketId}/status:
    patch:
      operationId: updateTicketStatus
      tags: [admin]
      summary: Update a support ticket's status
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTicketStatusInput"
      responses:
        "200":
          description: Updated ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportTicketRow"

  /admin/users/{userId}/extra-slots:
    patch:
      operationId: updateUserExtraSlots
      tags: [admin]
      summary: Manually set a user's extra device slot count
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserExtraSlotsInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"

  /admin/users/{userId}/role:
    patch:
      operationId: updateUserRole
      tags: [admin]
      summary: Update a user's role
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRoleUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    UserRole:
      type: string
      enum: [user, admin]

    RegisterInput:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8, maxLength: 200 }
        name: { type: string }

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 1, maxLength: 200 }

    ForgotPasswordInput:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }

    ForgotPasswordResult:
      type: object
      required: [message]
      properties:
        message: { type: string }

    ResetPasswordInput:
      type: object
      required: [token, password]
      properties:
        token: { type: string, minLength: 1 }
        password: { type: string, minLength: 8, maxLength: 200 }

    ResetPasswordResult:
      type: object
      required: [message]
      properties:
        message: { type: string }

    Me:
      type: object
      required: [id, email, role, hasActiveSubscription, deviceSlots, activeKeyCount]
      properties:
        id: { type: integer }
        email: { type: string }
        name: { type: ["string", "null"] }
        role:
          $ref: "#/components/schemas/UserRole"
        hasActiveSubscription: { type: boolean }
        currentPlanName: { type: ["string", "null"] }
        subscriptionEndsAt: { type: ["string", "null"], format: date-time }
        deviceSlots: { type: integer }
        activeKeyCount: { type: integer }

    Plan:
      type: object
      required: [id, name, priceRub, durationDays, devicesIncluded, isActive]
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: ["string", "null"] }
        priceRub: { type: integer }
        durationDays: { type: integer }
        devicesIncluded: { type: integer }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }

    PlanInput:
      type: object
      required: [name, priceRub, durationDays]
      properties:
        name: { type: string, minLength: 1 }
        description: { type: string }
        priceRub: { type: integer, minimum: 0 }
        durationDays: { type: integer, minimum: 1 }
        devicesIncluded: { type: integer, minimum: 1 }
        isActive: { type: boolean }

    PlanUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        description: { type: string }
        priceRub: { type: integer, minimum: 0 }
        durationDays: { type: integer, minimum: 1 }
        devicesIncluded: { type: integer, minimum: 1 }
        isActive: { type: boolean }

    PaymentSettings:
      type: object
      required: [sbpPhone, sbpBank, sbpRecipientName, extraDeviceSlotPriceRub, trialEnabled, trialDays]
      properties:
        sbpPhone: { type: string }
        sbpBank: { type: string }
        sbpRecipientName: { type: string }
        instructions: { type: ["string", "null"] }
        yookassaEnabled: { type: boolean }
        extraDeviceSlotPriceRub: { type: integer }
        trialEnabled: { type: boolean }
        trialDays: { type: integer }

    PaymentSettingsUpdate:
      type: object
      properties:
        sbpPhone: { type: string }
        sbpBank: { type: string }
        sbpRecipientName: { type: string }
        instructions: { type: string }
        yookassaEnabled: { type: boolean }
        extraDeviceSlotPriceRub: { type: integer, minimum: 0 }
        trialEnabled: { type: boolean }
        trialDays: { type: integer, minimum: 1 }

    SubscriptionStatus:
      type: string
      enum: [pending_payment, active, expired, cancelled, rejected]

    Subscription:
      type: object
      required: [id, planId, plan, status, createdAt]
      properties:
        id: { type: integer }
        planId: { type: integer }
        plan:
          $ref: "#/components/schemas/Plan"
        status:
          $ref: "#/components/schemas/SubscriptionStatus"
        startsAt: { type: ["string", "null"], format: date-time }
        endsAt: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }

    SubscriptionInput:
      type: object
      required: [planId]
      properties:
        planId: { type: integer }
        provider:
          $ref: "#/components/schemas/PaymentProvider"

    PaymentProvider:
      type: string
      enum: [manual_sbp, yookassa]

    PaymentStatus:
      type: string
      enum: [pending, confirmed, rejected]

    PaymentType:
      type: string
      enum: [subscription, extra_device_slot]

    Payment:
      type: object
      required: [id, subscriptionId, type, provider, amountRub, status, reference, createdAt]
      properties:
        id: { type: integer }
        subscriptionId: { type: ["integer", "null"] }
        type:
          $ref: "#/components/schemas/PaymentType"
        provider:
          $ref: "#/components/schemas/PaymentProvider"
        amountRub: { type: integer }
        status:
          $ref: "#/components/schemas/PaymentStatus"
        reference: { type: string }
        userNote: { type: ["string", "null"] }
        rejectionReason: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        confirmedAt: { type: ["string", "null"], format: date-time }

    AdminPayment:
      type: object
      required: [id, subscriptionId, userEmail, planName, type, provider, amountRub, status, reference, createdAt]
      properties:
        id: { type: integer }
        subscriptionId: { type: ["integer", "null"] }
        userEmail: { type: string }
        planName: { type: ["string", "null"] }
        type:
          $ref: "#/components/schemas/PaymentType"
        provider:
          $ref: "#/components/schemas/PaymentProvider"
        amountRub: { type: integer }
        status:
          $ref: "#/components/schemas/PaymentStatus"
        reference: { type: string }
        userNote: { type: ["string", "null"] }
        rejectionReason: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        confirmedAt: { type: ["string", "null"], format: date-time }

    PaymentNoteUpdate:
      type: object
      required: [userNote]
      properties:
        userNote: { type: string, minLength: 1 }

    PaymentReject:
      type: object
      properties:
        reason: { type: string }

    CheckoutResult:
      type: object
      required: [subscription, payment]
      properties:
        subscription:
          $ref: "#/components/schemas/Subscription"
        payment:
          $ref: "#/components/schemas/Payment"

    VpnNode:
      type: object
      required: [id, name, region, sni, isActive]
      properties:
        id: { type: integer }
        name: { type: string }
