kind = "web"
previewPath = "/"
title = "VPN Portal"
version = "1.0.0"
id = "artifacts/vpn-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24143

[services.development]
run = "pnpm --filter @workspace/vpn-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vpn-portal", "run", "build" ]
publicDir = "artifacts/vpn-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24143"
BASE_PATH = "/"
