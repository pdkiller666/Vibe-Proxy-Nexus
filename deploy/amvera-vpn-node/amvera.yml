meta:
  environment: docker
  toolchain:
    name: docker

build:
  dockerfile: Dockerfile

run:
  ports:
    - 443
    - 8443
  persistenceMount: /etc/xray
  # NOTE: Amvera does not support an `env:` key in amvera.yaml. All required
  # env vars (MGMT_API_SECRET, REALITY_PRIVATE_KEY, REALITY_PUBLIC_KEY,
  # REALITY_SHORT_ID, REALITY_SNI, TELEGRAM_BOT_TOKEN, TELEGRAM_ADMIN_CHAT_ID)
  # must be set manually in the Amvera dashboard under the project's
  # "Configuration" tab.
