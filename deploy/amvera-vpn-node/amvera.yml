meta:
  environment: docker
  toolchain:
    name: docker

build:
  dockerfile: Dockerfile

run:
  # Amvera's amvera.yaml schema has no `ports` (list) field — only a single
  # `containerPort` (integer). Any additional raw TCP ports (like Xray's 443
  # here) must be exposed via the "Dedicated IPv4" add-on / networking
  # settings in the Amvera dashboard, not via amvera.yaml.
  containerPort: 8443
  persistenceMount: /etc/xray
  # NOTE: Amvera does not support an `env:` key in amvera.yaml. All required
  # env vars (MGMT_API_SECRET, REALITY_PRIVATE_KEY, REALITY_PUBLIC_KEY,
  # REALITY_SHORT_ID, REALITY_SNI, TELEGRAM_BOT_TOKEN, TELEGRAM_ADMIN_CHAT_ID)
  # must be set manually in the Amvera dashboard under the project's
  # "Configuration" tab.
