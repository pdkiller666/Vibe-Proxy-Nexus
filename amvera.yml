meta:
  environment: docker
  toolchain:
    name: docker

build:
  dockerfile: Dockerfile

run:
  # Amvera's amvera.yaml schema only accepts a plain list of port numbers
  # here (the `number`/`protocol` object form is rejected as an "unknown
  # field" — confirmed by a failed deploy). Listing 8080 first is intentional:
  # it's the web UI + API (HTTP), and should be what the public domain
  # (https://...amvera.tech) routes to. 443 is Xray's raw VLESS-XTLS-Reality
  # port; reaching it from the internet requires the "Dedicated IPv4" add-on
  # in the Amvera dashboard — without it, only the web UI on 8080 is
  # reachable from the public domain.
  ports:
    - 8080
    - 443
  # Persist the live Xray config (issued clients) across restarts/redeploys.
  persistenceMount: /etc/xray
  # NOTE: Amvera does not support an `env:` key in amvera.yaml. All required
  # env vars (DATABASE_URL, SESSION_SECRET, REALITY_PRIVATE_KEY,
  # REALITY_PUBLIC_KEY, REALITY_SHORT_ID, REALITY_SNI) must be set manually
  # in the Amvera dashboard under the project's "Configuration" tab.
