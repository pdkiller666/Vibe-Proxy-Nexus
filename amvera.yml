meta:
  environment: docker
  toolchain:
    name: docker

build:
  dockerfile: Dockerfile

run:
  # IMPORTANT: there is no `ports` (list) field in Amvera's schema — that was
  # always invalid ("Configuration error ... unknown fields: ports"). The
  # supported field is `containerPort`, and per the Amvera dashboard's own
  # config UI it accepts a *comma-separated list* of internal ports (e.g.
  # "5000,3000,80"), each exposed externally. Trying "8080,443" here so both
  # the web/API (8080) and Xray's raw VLESS-XTLS-Reality port (443) are
  # reachable without the paid "Dedicated IPv4" add-on. Verify externally
  # after deploy — if 443 still answers with Amvera's own TLS cert instead of
  # a raw Reality handshake, this multi-port syntax doesn't do true TCP
  # passthrough for non-HTTP(S) ports and the add-on is required after all.
  containerPort: "8080,443"
  # Persist the live Xray config (issued clients) across restarts/redeploys.
  persistenceMount: /etc/xray
  # NOTE: Amvera does not support an `env:` key in amvera.yaml. All required
  # env vars (DATABASE_URL, SESSION_SECRET, REALITY_PRIVATE_KEY,
  # REALITY_PUBLIC_KEY, REALITY_SHORT_ID, REALITY_SNI) must be set manually
  # in the Amvera dashboard under the project's "Configuration" tab.
