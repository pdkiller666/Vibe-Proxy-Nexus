meta:
  environment: docker
  toolchain:
    name: docker

build:
  dockerfile: Dockerfile

run:
  ports:
    - 8080
    - 443
  # Persist the live Xray config (issued clients) across restarts/redeploys.
  persistenceMount: /etc/xray
  env:
    - name: DATABASE_URL
      secret: true
    - name: SESSION_SECRET
      secret: true
    - name: REALITY_PRIVATE_KEY
      secret: true
    - name: REALITY_PUBLIC_KEY
      secret: true
    - name: REALITY_SHORT_ID
      secret: true
    - name: REALITY_SNI
      value: www.microsoft.com
