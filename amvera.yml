meta:
  environment: docker
  toolchain:
    name: docker

build:
  dockerfile: Dockerfile

run:
  # Two ports mapped in parallel (comma-separated, positional 1:1):
  #   8080 (web/API)  -> servicePort 80    — goes through the normal HTTPS
  #                                          ingress bound to the app's domain.
  #   443  (Xray VPN) -> servicePort 27017 — goes through Amvera's raw-TCP
  #                                          SNI ingress (free), reachable at
  #                                          the "tcp-..." domain created in
  #                                          Настройки -> Домены with
  #                                          connection type MONGO. This is a
  #                                          genuine raw TCP passthrough (no
  #                                          TLS termination by Amvera), unlike
  #                                          plain containerPort/HTTP ingress.
  # See .agents/memory/amvera-raw-tcp-port.md for how this was discovered.
  containerPort: "8080,443"
  servicePort: "80,27017"
  # Persist the live Xray config (issued clients) across restarts/redeploys.
  persistenceMount: /etc/xray
  # NOTE: Amvera does not support an `env:` key in amvera.yaml. All required
  # env vars (DATABASE_URL, SESSION_SECRET, REALITY_PRIVATE_KEY,
  # REALITY_PUBLIC_KEY, REALITY_SHORT_ID, REALITY_SNI, REALITY_DEST) must be
  # set manually in the Amvera dashboard under the project's "Configuration"
  # tab. REALITY_SNI must equal the "tcp-..." domain from "Домены" above.
